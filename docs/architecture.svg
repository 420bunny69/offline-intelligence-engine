<svg width="680" height="440" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Offline AI Assistant architecture</title>
<desc>Three interfaces (CLI, API, Streamlit) call a shared extraction engine, which uses pluggable schemas and local Ollama models.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect width="680" height="440" fill="#ffffff"/>

<!-- Row 1: interfaces -->
<g><rect x="80" y="20" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="160" y="40" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">CLI</text>
<text x="160" y="58" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">cli/chat.py</text></g>
<g><rect x="260" y="20" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="40" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">API</text>
<text x="340" y="58" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">api/main.py (FastAPI)</text></g>
<g><rect x="440" y="20" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="520" y="40" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Streamlit UI</text>
<text x="520" y="58" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">app.py</text></g>

<line x1="160" y1="76" x2="160" y2="100" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="76" x2="340" y2="100" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="520" y1="76" x2="520" y2="100" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Engine container -->
<g><rect x="60" y="100" width="560" height="230" rx="20" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="80" y="130" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Extraction engine</text>
<text x="80" y="146" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">engine/ — model + schema agnostic</text></g>

<!-- core modules -->
<g><rect x="80" y="150" width="150" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="155" y="168" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">client.py</text></g>
<g><rect x="265" y="150" width="150" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="168" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">extract.py</text></g>
<g><rect x="450" y="150" width="150" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="525" y="168" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">registry.py</text></g>

<!-- schemas subregion -->
<g><rect x="80" y="206" width="520" height="104" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="100" y="226" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">schemas/ (pluggable)</text></g>
<g><rect x="100" y="240" width="140" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="170" y="258" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">meeting.py</text></g>
<g><rect x="270" y="240" width="140" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="340" y="258" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">resume.py</text></g>
<g><rect x="440" y="240" width="140" height="36" rx="6" fill="#F1EFE8" stroke="#5f5e5a" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="510" y="258" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">+ your schema</text></g>

<line x1="340" y1="330" x2="340" y2="360" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Ollama models -->
<text x="340" y="346" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5f5e5a">Local inference (Ollama)</text>
<g><rect x="70" y="360" width="170" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="155" y="380" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">llama3.2:3b</text>
<text x="155" y="398" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">GPU · ~28 tok/s</text></g>
<g><rect x="255" y="360" width="170" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="380" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">phi4-mini</text>
<text x="340" y="398" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">GPU · ~15 tok/s</text></g>
<g><rect x="440" y="360" width="170" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="525" y="380" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">mistral:7b</text>
<text x="525" y="398" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">CPU fallback · slow</text></g>
</svg>
